- id: s3_backend_key
  name: Terraform s3 backend key paths
  description: Enforce all terraform s3 backend key paths match folder structure.
  entry: s3_backend_key.sh
  language: script
  files: (\.tf)$
  exclude: \.terraform\/.*$

- id: tf_provider_lock
  name: Add Terraform provider dependency lock file
  description: Add MacOS and Linux provider hashes to dependency lock file
  entry: tf_providers_lock.sh
  always_run: true
  language: script
  pass_filenames: false

- id: tf_validate_config
  name: Terraform configuration validation
  description: Enforce terraform version matches .tool-versions and s3 backends use use_lockfile instead of dynamodb_table
  entry: tf_validate_config.sh
  always_run: true
  language: script
  pass_filenames: false

- id: tf_required_files
  name: Terraform required files
  description: Enforce every directory with .tf files has terraform.tf and README.md
  entry: tf_required_files.sh
  language: script
  files: (\.tf)$
  exclude: \.terraform\/.*$

- id: s3_backend_config
  name: S3 backend bucket and region
  description: Enforce S3 backend blocks use bucket cru-tf-remote-state in us-east-1
  entry: s3_backend_config.sh
  language: script
  files: (\.tf)$
  exclude: \.terraform\/.*$

- id: tf_version_constraints
  name: Terraform provider version constraints
  description: Enforce provider version constraints use pessimistic operator (~>)
  entry: tf_version_constraints.sh
  language: script
  files: (\.tf)$
  exclude: \.terraform\/.*$
